<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旗艦購物網</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #222; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { display: flex; padding: 20px; max-width: 1200px; margin: auto; gap: 20px; flex-wrap: wrap; }
        
        /* 搜尋與分類列 */
        .toolbar { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; }
        .toolbar input, .toolbar select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .toolbar input { flex: 1; }

        /* 商品區 */
        .main-content { flex: 3; min-width: 60%; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .category-tag { font-size: 0.8em; background: #eee; color: #555; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; }
        .price { color: #e44d26; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .btn { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover { background-color: #0056b3; }
        
        /* 購物車側邊欄 */
        .cart-sidebar { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-self: flex-start; position: sticky; top: 80px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9em; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .total { font-size: 1.2em; font-weight: bold; text-align: right; margin-top: 15px; border-top: 2px solid #333; padding-top: 10px; }
        .checkout-btn { background-color: #28a745; margin-top: 15px; font-size: 1.1em; width: 100%; padding: 12px; border: none; color: white; border-radius: 4px; cursor: pointer; }
        
        /* 留言板區塊 */
        .comment-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .comment-input-area input, .comment-input-area textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .comment-input-area textarea { height: 80px; resize: vertical; }
        .star-rating { font-size: 24px; color: #ccc; cursor: pointer; margin-bottom: 10px; display: inline-block; }
        .star-rating .star.active { color: #ffc107; }
        .display-stars { color: #ffc107; font-size: 1.1em; letter-spacing: 2px; }
        .comment-list { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .comment-box { background: #f9f9f9; padding: 15px; border-radius: 6px; border-left: 4px solid #007bff; }

        /* --- 新增：結帳彈出視窗 (Modal) 的樣式 --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 1em; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 1em; }
    </style>
</head>
<body>

    <header>
        <h2>MyShop 旗艦商城</h2>
        <div id="cart-counter" style="font-weight: bold;">🛒 購物車 (0)</div>
    </header>

    <div class="container">
        <!-- 左邊主內容 -->
        <div class="main-content">
            <div class="toolbar">
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="all">全部分類</option>
                    <option value="3C/家電">3C/家電</option>
                    <option value="運動用品">運動用品</option>
                    <option value="食品/飲品">食品/飲品</option>
                </select>
                <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋商品..." onkeyup="filterProducts()">
            </div>
            <div class="products" id="product-list"></div>

            <h3 style="border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-top: 40px;">買家評價</h3>
            <div class="comment-section">
                <div class="comment-input-area">
                    <div>
                        <span style="font-weight: bold; margin-right: 10px;">給予評分：</span>
                        <div class="star-rating" id="starSelector">
                            <span class="star active" onclick="setRating(1)">★</span>
                            <span class="star active" onclick="setRating(2)">★</span>
                            <span class="star active" onclick="setRating(3)">★</span>
                            <span class="star active" onclick="setRating(4)">★</span>
                            <span class="star active" onclick="setRating(5)">★</span>
                        </div>
                    </div>
                    <input type="text" id="userName" placeholder="您的暱稱">
                    <textarea id="userMessage" placeholder="寫下您對商品的真實評價..."></textarea>
                    <button class="btn" onclick="addComment()" style="background-color: #17a2b8;">發佈評價</button>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>

        <!-- 右邊購物車 -->
        <div class="cart-sidebar">
            <h3>購物車清單</h3>
            <div id="cart-items"><p style="color: #888;">購物車是空的</p></div>
            <div class="total" id="cart-total">總計: NT$0</div>
            <button class="checkout-btn" onclick="openCheckout()">前往結帳</button>
        </div>
    </div>

    <!-- --- 新增：結帳彈出視窗 (預設隱藏) --- -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content">
            <h3>填寫結帳與配送資料</h3>
            <div class="form-group">
                <label>收件人姓名 <span style="color:red;">*</span></label>
                <input type="text" id="buyerName" placeholder="例如：王小明">
            </div>
            <div class="form-group">
                <label>聯絡電話 <span style="color:red;">*</span></label>
                <input type="text" id="buyerPhone" placeholder="例如：0912345678">
            </div>
            <div class="form-group">
                <label>寄送地址 <span style="color:red;">*</span></label>
                <input type="text" id="buyerAddress" placeholder="請輸入完整收件地址">
            </div>
            <div class="form-group">
                <label>信用卡號 (模擬測試，請勿輸入真卡號)</label>
                <input type="text" placeholder="**** **** **** ****">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeCheckout()">取消返回</button>
                <button class="btn-submit" onclick="processPayment()">確認付款</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "噶瑪蘭山川首席威士忌", price: 1750, category: "食品/飲品" },
            { id: 2, name: "行動微型投影機", price: 15900, category: "3C/家電" },
            { id: 3, name: "防霧雙層滑雪護目鏡", price: 2200, category: "運動用品" },
            { id: 4, name: "大容量防水健身包", price: 850, category: "運動用品" },
            { id: 5, name: "降噪藍牙耳機 PRO", price: 4500, category: "3C/家電" },
            { id: 6, name: "手沖咖啡濾泡包組", price: 399, category: "食品/飲品" }
        ];

        let cart = [];
        let currentRating = 5;

        // 商品渲染與搜尋
        function renderProducts(productList = products) {
            const productContainer = document.getElementById("product-list");
            productContainer.innerHTML = ""; 
            if(productList.length === 0) {
                productContainer.innerHTML = "<p style='color:#888; grid-column: span 3;'>找不到符合的商品喔！</p>";
                return;
            }
            productList.forEach(product => {
                productContainer.innerHTML += `
                    <div class="product-card">
                        <div style="height:140px; background:#e9ecef; display:flex; align-items:center; justify-content:center; color:#adb5bd; border-radius: 4px; margin-bottom: 10px;">商品圖片</div>
                        <span class="category-tag">${product.category}</span>
                        <h4 style="margin: 5px 0;">${product.name}</h4>
                        <div class="price">NT$${product.price.toLocaleString()}</div>
                        <button class="btn" onclick="addToCart(${product.id})">加入購物車</button>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const categoryFilter = document.getElementById("categoryFilter").value;
            const filteredProducts = products.filter(product => {
                const matchCategory = (categoryFilter === "all" || product.category === categoryFilter);
                const matchSearch = product.name.toLowerCase().includes(searchText);
                return matchCategory && matchSearch;
            });
            renderProducts(filteredProducts);
        }

        // 購物車功能
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) existingItem.quantity += 1;
            else cart.push({ ...product, quantity: 1 });
            updateCartUI();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById("cart-items");
            const cartTotal = document.getElementById("cart-total");
            const cartCounter = document.getElementById("cart-counter");

            cartItemsContainer.innerHTML = "";
            let total = 0, count = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="color: #888;">購物車是空的</p>';
            } else {
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    count += item.quantity;
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <div style="font-weight: bold;">${item.name}</div>
                                <div style="color: #666; font-size: 0.9em;">NT$${item.price.toLocaleString()} x ${item.quantity}</div>
                            </div>
                            <button class="del-btn" onclick="removeFromCart(${item.id})">刪除</button>
                        </div>
                    `;
                });
            }
            cartTotal.innerText = `總計: NT$${total.toLocaleString()}`; 
            cartCounter.innerText = `🛒 購物車 (${count})`;
        }

        // --- 新增：結帳視窗控制邏輯 ---
        function openCheckout() {
            if (cart.length === 0) { 
                alert("購物車是空的，請先挑選喜歡的商品喔！"); 
                return; 
            }
            // 顯示結帳視窗
            document.getElementById("checkoutModal").style.display = "flex";
        }

        function closeCheckout() {
            // 隱藏結帳視窗
            document.getElementById("checkoutModal").style.display = "none";
        }

        function processPayment() {
            const name = document.getElementById("buyerName").value.trim();
            const phone = document.getElementById("buyerPhone").value.trim();
            const address = document.getElementById("buyerAddress").value.trim();

            if (!name || !phone || !address) {
                alert("請填寫完整的姓名、電話與地址才能為您出貨喔！");
                return;
            }

            // 模擬結帳成功
            alert(`✅ 付款成功！\n\n感謝 ${name} 的訂購！\n您的商品將於 3 天內寄送至：\n${address}`);
            
            // 結帳後清空資料
            cart = []; 
            updateCartUI();
            document.getElementById("buyerName").value = "";
            document.getElementById("buyerPhone").value = "";
            document.getElementById("buyerAddress").value = "";
            closeCheckout(); // 關閉視窗
        }

        // 留言板與星星功能
        function setRating(rating) {
            currentRating = rating;
            const stars = document.querySelectorAll('#starSelector .star');
            stars.forEach((star, index) => {
                if (index < rating) star.classList.add('active');
                else star.classList.remove('active');
            });
        }

        function getStarsString(rating) { return '★'.repeat(rating) + '☆'.repeat(5 - rating); }

        function addComment() {
            const nameInput = document.getElementById("userName").value.trim();
            const messageInput = document.getElementById("userMessage").value.trim();
            if (!nameInput || !messageInput) { alert("暱稱和評價內容都不能空白喔！"); return; }

            const commentList = document.getElementById("commentList");
            const dateStr = new Date().toLocaleString();
            const starString = getStarsString(currentRating); 
            
            const newCommentHTML = `
                <div class="comment-box">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <div><strong>${nameInput}</strong><span class="display-stars" style="margin-left: 10px;">${starString}</span></div>
                        <span style="font-size: 0.8em; color: #888;">${dateStr}</span>
                    </div>
                    <div style="margin-top: 8px; line-height: 1.5;">${messageInput}</div>
                </div>
            `;
            if(commentList.innerHTML.includes("快來搶頭香")) commentList.innerHTML = "";
            commentList.insertAdjacentHTML('afterbegin', newCommentHTML);
            
            document.getElementById("userName").value = "";
            document.getElementById("userMessage").value = "";
            setRating(5);
        }

        window.onload = () => {
            renderProducts(); 
            document.getElementById("commentList").innerHTML = "<p style='color:#888;'>目前還沒有評價，快來搶頭香！</p>";
        };
    </script>
</body>
</html>
