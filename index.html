<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旗艦購物網</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #222; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { display: flex; padding: 20px; max-width: 1200px; margin: auto; gap: 20px; flex-wrap: wrap; }
        .toolbar { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; }
        .toolbar input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .main-content { flex: 3; min-width: 60%; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .category-tag { font-size: 0.8em; background: #eee; color: #555; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; }
        .price { color: #e44d26; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .btn { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover { background-color: #0056b3; }
        .cart-sidebar { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-self: flex-start; position: sticky; top: 80px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9em; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .total { font-size: 1.2em; font-weight: bold; text-align: right; margin-top: 15px; border-top: 2px solid #333; padding-top: 10px; }
        .checkout-btn { background-color: #28a745; margin-top: 15px; font-size: 1.1em; width: 100%; padding: 12px; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .comment-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .comment-input-area input, .comment-input-area textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .comment-input-area textarea { height: 80px; resize: vertical; }
        .star-rating { font-size: 24px; color: #ccc; cursor: pointer; margin-bottom: 10px; display: inline-block; }
        .star-rating .star.active { color: #ffc107; }
        .display-stars { color: #ffc107; font-size: 1.1em; letter-spacing: 2px; }
        .comment-list { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .comment-box { background: #f9f9f9; padding: 15px; border-radius: 6px; border-left: 4px solid #007bff; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 1em; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 1em; }
    </style>
</head>
<body>

    <header>
        <h2>MyShop 旗艦商城</h2>
        <div id="cart-counter" style="font-weight: bold;">🛒 購物車 (0)</div>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋商品..." onkeyup="filterProducts()">
            </div>

            <div class="products" id="product-list">
                <p style="color: #888;">正在從雲端載入商品...</p>
            </div>

            <h3 style="border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-top: 40px;">買家評價</h3>
            <div class="comment-section">
                <div class="comment-input-area">
                    <div>
                        <span style="font-weight: bold; margin-right: 10px;">給予評分：</span>
                        <div class="star-rating" id="starSelector">
                            <span class="star active" onclick="setRating(1)">★</span>
                            <span class="star active" onclick="setRating(2)">★</span>
                            <span class="star active" onclick="setRating(3)">★</span>
                            <span class="star active" onclick="setRating(4)">★</span>
                            <span class="star active" onclick="setRating(5)">★</span>
                        </div>
                    </div>
                    <input type="text" id="userName" placeholder="您的暱稱">
                    <textarea id="userMessage" placeholder="寫下您對商品的真實評價..."></textarea>
                    <button class="btn" onclick="addComment()" style="background-color: #17a2b8;">發佈評價</button>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>

        <div class="cart-sidebar">
            <h3>購物車清單</h3>
            <div id="cart-items"><p style="color: #888;">購物車是空的</p></div>
            <div class="total" id="cart-total">總計: NT$0</div>
            <button class="checkout-btn" onclick="openCheckout()">前往結帳</button>
        </div>
    </div>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content">
            <h3>填寫結帳與配送資料</h3>
            <div class="form-group"><label>收件人姓名 *</label><input type="text" id="buyerName" placeholder="例如：王小明"></div>
            <div class="form-group"><label>聯絡電話 *</label><input type="text" id="buyerPhone" placeholder="例如：0912345678"></div>
            <div class="form-group"><label>寄送地址 *</label><input type="text" id="buyerAddress" placeholder="請輸入完整收件地址"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeCheckout()">取消返回</button>
                <button class="btn-submit" onclick="processPayment()">確認送出訂單</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // ！！！請將下面這段換成你真實的 firebaseConfig ！！！
        const firebaseConfig = {
  apiKey: "AIzaSyD_eAZ3noYVygzbS9LSnIJaA4OlfLEgsY0",
  authDomain: "shop-9eb42.firebaseapp.com",
  projectId: "shop-9eb42",
  storageBucket: "shop-9eb42.firebasestorage.app",
  messagingSenderId: "1069563087190",
  appId: "1:1069563087190:web:d7f185d145b1de50afeef7",
  measurementId: "G-XC1MNR0W7X"
};

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🌟 改變在這裡：商品陣列初始為空
        let products = [];
        let cart = [];
        let currentRating = 5;

        // ==========================================
        // 📦 雲端動態商品庫邏輯 (全新加入！)
        // ==========================================

        // 從 Firebase 讀取商品
        function loadProducts() {
            // 去 Firebase 抓取最新的商品清單
            db.collection("products").get().then((querySnapshot) => {
                const container = document.getElementById("product-list");
                products = []; // 清空現有陣列

                if (querySnapshot.empty) {
                    container.innerHTML = "<p style='color:#888; grid-column: span 3; text-align:center;'>資料庫目前沒有商品喔！請至後台新增。</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    let productData = doc.data();
                    productData.id = doc.id; // 把 Firebase 的 ID 存起來
                    products.push(productData);
                });

                // 資料準備好後，顯示商品
                renderProducts(products);
            }).catch((error) => {
                console.error("載入商品失敗:", error);
                document.getElementById("product-list").innerHTML = "<p style='color:red;'>無法連線到資料庫。</p>";
            });
        }

        // 在畫面上畫出商品
        function renderProducts(productListToRender) {
            const container = document.getElementById("product-list");
            container.innerHTML = "";
            
            if(productListToRender.length === 0) {
                container.innerHTML = "<p style='color:#888; grid-column: span 3; text-align:center;'>找不到符合的商品。</p>";
                return;
            }

            productListToRender.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div style="height:140px; background:#e9ecef; display:flex; align-items:center; justify-content:center; border-radius: 4px; margin-bottom: 10px; color:#adb5bd;">圖片</div>
                        <span class="category-tag">${p.category}</span>
                        <h4 style="margin: 5px 0;">${p.name}</h4>
                        <div class="price">NT$${p.price.toLocaleString()}</div>
                        <button class="btn" onclick="addToCart('${p.id}')">加入購物車</button>
                    </div>
                `;
            });
        }

        // 搜尋過濾功能
        function filterProducts() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const filteredProducts = products.filter(product => {
                return product.name.toLowerCase().includes(searchText);
            });
            renderProducts(filteredProducts);
        }

        // ==========================================
        // 🛒 購物車邏輯 (保持不變，修改了 ID 格式)
        // ==========================================
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            if (item) item.quantity += 1; else cart.push({ ...product, quantity: 1 });
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById("cart-items");
            cartItems.innerHTML = "";
            let total = 0, count = 0;
            if (cart.length === 0) { cartItems.innerHTML = '<p style="color: #888;">購物車是空的</p>'; }
            else {
                cart.forEach(item => {
                    total += item.price * item.quantity; count += item.quantity;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <div><b>${item.name}</b><br><span style="color:#666; font-size:0.9em;">NT$${item.price.toLocaleString()} x ${item.quantity}</span></div>
                            <button class="del-btn" onclick="removeFromCart('${item.id}')">刪除</button>
                        </div>`;
                });
            }
            document.getElementById("cart-total").innerText = `總計: NT$${total.toLocaleString()}`;
            document.getElementById("cart-counter").innerText = `🛒 購物車 (${count})`;
        }

        // ==========================================
        // 結帳與留言板邏輯 (保持不變)
        // ==========================================
        function openCheckout() { if (cart.length === 0) alert("購物車是空的喔！"); else document.getElementById("checkoutModal").style.display = "flex"; }
        function closeCheckout() { document.getElementById("checkoutModal").style.display = "none"; }
        function processPayment() {
            const name = document.getElementById("buyerName").value.trim();
            const phone = document.getElementById("buyerPhone").value.trim();
            const address = document.getElementById("buyerAddress").value.trim();
            if (!name || !phone || !address) { alert("請填寫完整寄送資料！"); return; }
            let totalAmount = 0;
            cart.forEach(item => totalAmount += item.price * item.quantity);
            db.collection("orders").add({
                buyerName: name, buyerPhone: phone, buyerAddress: address,
                items: cart, totalAmount: totalAmount, status: "新訂單",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert(`✅ 結帳成功！感謝 ${name} 的訂購。`);
                cart = []; updateCartUI();
                document.getElementById("buyerName").value = "";
                document.getElementById("buyerPhone").value = "";
                document.getElementById("buyerAddress").value = "";
                closeCheckout();
            });
        }
        function setRating(rating) { currentRating = rating; document.querySelectorAll('#starSelector .star').forEach((star, index) => { if (index < rating) star.classList.add('active'); else star.classList.remove('active'); }); }
        function getStarsString(rating) { return '★'.repeat(rating) + '☆'.repeat(5 - rating); }
        function addComment() {
            const nameInput = document.getElementById("userName").value.trim();
            const messageInput = document.getElementById("userMessage").value.trim();
            if (!nameInput || !messageInput) { alert("暱稱和評價內容不能空白喔！"); return; }
            db.collection("comments").add({ name: nameInput, message: messageInput, rating: currentRating, timestamp: firebase.firestore.FieldValue.serverTimestamp() }).then(() => { document.getElementById("userName").value = ""; document.getElementById("userMessage").value = ""; setRating(5); });
        }
        function listenForComments() {
            const commentList = document.getElementById("commentList");
            db.collection("comments").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
                commentList.innerHTML = ""; 
                if (querySnapshot.empty) { commentList.innerHTML = "<p style='color:#888;'>目前還沒有評價。</p>"; return; }
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const starString = getStarsString(data.rating || 5);
                    const dateStr = data.timestamp ? data.timestamp.toDate().toLocaleString() : "剛剛";
                    commentList.innerHTML += `<div class="comment-box"><div style="display: flex; justify-content: space-between; margin-bottom: 5px;"><div><strong>${data.name}</strong><span class="display-stars" style="margin-left: 10px;">${starString}</span></div><span style="font-size: 0.8em; color: #888;">${dateStr}</span></div><div style="margin-top: 8px; line-height: 1.5;">${data.message}</div></div>`;
                });
            });
        }

        // 🌟 初始化，網頁載入時去雲端抓商品！
        window.onload = () => {
            loadProducts(); // 啟動雲端抓商品邏輯
            listenForComments();
        };
    </script>
</body>
</html>
